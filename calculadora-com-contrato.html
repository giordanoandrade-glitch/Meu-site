<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora com Contrato</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide-icons@0.2.0/dist/lucide.min.js"></script>
    <style>
        @media print {
            /* CSS styles for printing the contract */
            .printable {
                display: block;
            }
            body * {
                display: none;
            }
            body .printable {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="container mx-auto p-4">
        <h1 class="text-2xl font-bold">Calculadora de Eventos</h1>
        <form id="calculator-form">
            <!-- Full calculator from index.html goes here -->
            <!-- Include logic for calculations and options -->
            <div class="my-4">
                <label for="contractor-type" class="block">Tipo de Contratante:</label>
                <select id="contractor-type" class="border rounded p-2">
                    <option value="pf">Pessoa Física</option>
                    <option value="pj">Pessoa Jurídica</option>
                </select>
            </div>
            <div class="my-4">
                <label for="event-details" class="block">Detalhes do Evento:</label>
                <input type="text" id="event-details" class="border rounded p-2" placeholder="Insira os detalhes do evento">
            </div>
            <div class="my-4">
                <label for="payment-terms" class="block">Termos de Pagamento:</label>
                <input type="text" id="payment-terms" class="border rounded p-2" placeholder="Insira os termos de pagamento">
            </div>
            <button type="button" id="generate-contract" class="bg-blue-500 text-white rounded p-2">Ver Contrato</button>
        </form>
        <div id="contract-preview" class="modal hidden printable">
            <h2>Contrato</h2>
            <div id="contract-text"></div>
            <button onclick="window.print()" class="bg-green-500 text-white rounded p-2">Imprimir</button>
        </div>
    </div>
    <script>
        document.getElementById('generate-contract').addEventListener('click', function() {
            // Logic to generate the contract text from calculated values and inputs
            let contractorType = document.getElementById('contractor-type').value;
            let eventDetails = document.getElementById('event-details').value;
            let paymentTerms = document.getElementById('payment-terms').value;

            let contractText = `Contrato de ${contractorType} - ${eventDetails} - ${paymentTerms}`;
            document.getElementById('contract-text').innerText = contractText;
            document.getElementById('contract-preview').classList.remove('hidden');
        });
    </script>
</body>
</html>
